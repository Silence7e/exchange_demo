apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exchange
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: your-domain.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: exchange-api
                port:
                  number: 4000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: exchange-api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: exchange-web
                port:
                  number: 3000
